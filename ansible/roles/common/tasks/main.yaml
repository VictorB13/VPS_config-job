---
- name: Set default iptables policies to ACCEPT during configuration
  ansible.builtin.iptables:
    policy: ACCEPT
    chain: "{{ item }}"
  loop: [ 'INPUT', 'OUTPUT', 'FORWARD' ]
 
- name: Flush all existing iptables rules to prevent connection blocks
  ansible.builtin.iptables:
    flush: yes

- name: Update apt cache
  apt: # Use the apt module to update the package cache
    update_cache: yes

- name: Install required packages
  apt:
    name:
      - curl
      - wget
      - vim
      - nano
      - git
      - unzip
      - jq
      - net-tools
      - tcpdump
      - traceroute
      - htop
      - rsync
      - tar
      - python3
      - python3-pip
      - fail2ban
      - iptables-persistent
      - ntp
      - dnsmasq
    state: present # Ensure the packages are installed

- name: Download and Run Docker installation script
  ansible.builtin.shell: |
    curl -fsSL https://get.docker.com -o get-docker.sh
    sh get-docker.sh
  args:
    creates: /usr/bin/docker

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes

- name: Install Docker SDK for Python
  ansible.builtin.pip:
    name: docker
    state: present

- name: Export usr/sbin and /sbin in .bashrc path
  ansible.builtin.lineinfile:
    path: ~/.bashrc
    regexp: ':/usr/sbin:/sbin'
    line: 'export PATH=$PATH:/usr/sbin:/sbin'
    state: present

- name: Configure user .bashrc history to include date & timestamp
  ansible.builtin.lineinfile:
    path: ~/.bashrc
    regexp: '^export HISTTIMEFORMAT='
    line: 'export HISTTIMEFORMAT="%F %T "'
    state: present

- name: Enable & Start NTP service
  ansible.builtin.service:
    name: ntp
    state: started
    enabled: yes

- name: Stop and disable systemd-resolved (to free up port 53)
  ansible.builtin.service:
    name: systemd-resolved
    state: stopped
    enabled: no

- name: Remove systemd-resolved stub resolv.conf symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent

- name: Write static resolv.conf so DNS works after systemd-resolved is gone
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 8.8.8.8
      nameserver 1.1.1.1
    mode: '0644'

- name: Configure dnsmasq service
  ansible.builtin.copy:
    dest: /etc/dnsmasq.conf
    content: |
      interface=lo
      interface=tun+

      server=8.8.8.8
      server=1.1.1.1

      cache-size=1000
      bind-dynamic

    mode: '0644'

- name: Restart dnsmasq service
  ansible.builtin.service:
    name: dnsmasq
    state: restarted
    enabled: yes